  const job = reactive({ id, workflow: p.workflowLabel, workflowFile: p.workflowFile, prompt: (p.promptText || '').slice(0, 200), fullPrompt: p.promptText || '', loras: p.loras || null, sourceFile: p.source.name, sourcePath: p.source.path, sourceImageUrl: '/file/' + enc(p.source.path), status: 'running', runs: 1, presets: p.preset ? [p.preset] : [], startTime: Date.now(), endTime: null, promptIds: [], results: [], _pct: 0, _node: 'Preparing…', _log: [], _params: p, _live: true });
  store.jobs.unshift(job); persist(job);
  (async () => {
    const log = (m, cls) => { job._log.push({ m, cls: cls || '' }); if (job._log.length > 200) job._log.shift(); };
    let uploadedName = null;
    try { if (p.source.type === 'image') { job._node = 'Uploading image…'; uploadedName = await uploadImagePath(p.source.path); } else if (p.source.type === 'video') { job._node = 'Extracting frame…'; const b = await firstVideoFrameBlob('/file/' + enc(p.source.path)); uploadedName = await uploadBlob(b, 'png'); } } catch (e) { log('input upload: ' + e.message, 'err'); }
    if (uploadedName) log('Input uploaded as ' + uploadedName);
    job._node = 'Applying fields…';
    let data;
    try { data = await fetch('/api/workflow-prompt?name=' + enc(p.workflowFile), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fieldValues: p.fieldValues }) }).then(r => r.json()); } catch (e) { log('build prompt: ' + e.message, 'err'); job.status = 'error'; job.endTime = Date.now(); persist(job); return; }
    if (data.error) { log('error: ' + data.error, 'err'); job.status = 'error'; job.endTime = Date.now(); persist(job); return; }
    (data.fieldWarnings || []).forEach(w => log('field: ' + w, 'warn'));
    const graph = data.workflow || null; const prompt = data.prompt || data;
    if (uploadedName) for (const n of Object.values(prompt)) { const t = (n._meta && n._meta.title || '').toUpperCase(); if (t.includes('MAIN IMAGE') && n.inputs) n.inputs.image = uploadedName; }
    for (const n of Object.values(prompt)) { if (n.inputs && !p.seedPinned) for (const k of Object.keys(n.inputs)) { if (k.includes('seed') && typeof n.inputs[k] === 'number') n.inputs[k] = Math.floor(Math.random() * 2147483647); } if (n.is_changed) delete n.is_changed; }
    const ok = await execWs(job, prompt, graph, log);
    job.status = ok ? 'done' : 'error'; job.endTime = Date.now(); job._pct = 100; persist(job);
    if (jobChannel && job.promptIds[0]) jobChannel.postMessage({ type: 'done', promptId: job.promptIds[0], ok });
    if (ok) { job._node = 'Scanning outputs…'; await collectOutputs(job); }
  })();
  return id;
}
function cancelJob(job) { if (job && job._interrupt) job._interrupt(); if (job) job._node = 'Interrupting…'; }
async function deleteJob(job) { const i = store.jobs.indexOf(job); if (i >= 0) store.jobs.splice(i, 1); try { await JobDB.del(job.id); } catch (e) {} }

const actions = {
  async loadDir(dir) { store.browser.loading = true; try { const q = dir ? ('?limit=300&dir=' + enc(dir)) : '?limit=300'; const r = await fetch('/api/list' + q).then(x => x.json()); store.browser.items = r.items || []; store.browser.parent = r.parent; store.browser.dir = r.dir || ''; store.browser.loaded = true; } catch (e) {} store.browser.loading = false; },
  async loadWorkflows() { if (!store.workflowsLoaded) { try { store.workflows = await fetch('/api/workflows').then(r => r.json()); store.workflowsLoaded = true; } catch (e) {} } return store.workflows; },
  launchJob, cancelJob, deleteJob,
};

// Hydrate jobs from IndexedDB once, resolve orphaned running jobs, and merge in
// jobs created by other tabs/pages without clobbering this tab's live jobs.
async function hydrateJobs() {
  try {
    const all = await JobDB.getAll(); all.sort((a, b) => b.startTime - a.startTime);
    for (const j of all) { if (byId(j.id)) continue; j._pct = (j.status === 'done' || j.status === 'complete') ? 100 : 0; j._node = j.status === 'running' ? 'reconnecting…' : ''; j._log = []; j._live = false; store.jobs.push(reactive(j)); }
    store.jobs.sort((a, b) => (a.status === 'running' ? 0 : 1) - (b.status === 'running' ? 0 : 1) || b.startTime - a.startTime);
    store.jobsLoaded = true;
  } catch (e) {}
  // Poll /history for every queued running job (incl. live ones) — a WebSocket
  // can miss the completion message, and without this backstop such a job would
  // spin forever. /history is authoritative, so it's safe alongside a live WS.
  for (const j of store.jobs.filter(x => x.status === 'running' && x.promptIds && x.promptIds.length && !x._recovering)) recoverJob(j);
}
hydrateJobs();
setInterval(hydrateJobs, 8000);
if (jobChannel) jobChannel.addEventListener('message', (evt) => {
  const m = evt.data || {}; if (!m || !m.promptId) return;
  const j = store.jobs.find(x => (x.promptIds || []).includes(m.promptId)); if (!j) return;
  if (m.type === 'progress' && m.pct != null) j._pct = m.pct;
  else if (m.type === 'executing') { if (m.node) j._node = m.node; if (m.pct != null) j._pct = m.pct; }
  else if (m.type === 'done') { j.status = m.ok ? 'done' : 'error'; j._pct = 100; }
});

// Detected-fields form + real remix (launches a job into the central store).
const FieldsForm = {
  props: { name: String, source: Object, prefillPrompt: String, prefillSeed: [Number, String] },
  components: { FieldControl },
  setup(props) {
    const state = reactive({ fields: [], presets: [], loading: true, error: '' });
    const selectedPreset = ref(''); const msg = ref(''); const startedId = ref(null);
    const job = computed(() => startedId.value ? byId(startedId.value) : null);
    async function load() {
      state.loading = true; startedId.value = null; msg.value = '';
      try {
        const cfg = await fetch('/api/workflow-field-config?name=' + enc(props.name)).then(r => r.json());
        if (cfg.error || !Array.isArray(cfg.fields)) { state.error = cfg.error || 'No config'; state.fields = []; state.presets = []; }
        else {
          state.error = ''; state.presets = cfg.presets || [];
          for (const f of cfg.fields) { if (f.kind === 'seed') { if (Number(f.value) < 0) f.value = ''; f._pin = false; } if (ctype(f) === 'lora_rows' && !Array.isArray(f.value)) f.value = []; if (ctype(f) === 'boolean') f.value = !!f.value; }
          if (props.prefillPrompt) { const pf = cfg.fields.find(f => f.kind === 'prompt' && !f.variant); if (pf) pf.value = props.prefillPrompt; }
          if (props.prefillSeed != null && Number(props.prefillSeed) >= 0) { const sf = cfg.fields.find(f => f.kind === 'seed'); if (sf) sf.value = props.prefillSeed; }
          state.fields = cfg.fields;
        }
      } catch (e) { state.error = String(e.message || e); }
      state.loading = false;
    }
    onMounted(load); watch(() => props.name, load);
    const enabledFields = computed(() => state.fields.filter(f => f.enabled).slice().sort(loraLast));
    const hiddenFields = computed(() => state.fields.filter(f => !f.enabled).slice().sort(loraLast));
    const isWide = f => WIDE.has(f.kind);
    function collectFieldValues() {
      const fv = {};
      for (const f of state.fields) { if (!f.enabled) continue; const t = ctype(f);
        if (f.kind === 'seed') { if (f._pin && String(f.value).trim() !== '') fv[f.id] = parseInt(f.value, 10); continue; }
        if (t === 'lora_rows') { fv[f.id] = (f.value || []).map(r => ({ slot: r.slot, on: r.on, strength: r.strength })); continue; }
        if (t === 'boolean') { fv[f.id] = !!f.value; continue; }
        if (f.value !== '' && f.value != null) fv[f.id] = f.value;
      }
      if (selectedPreset.value) fv.__preset = selectedPreset.value;
      return fv;
    }
    function remix() {
      if (!props.source) return;
      const pf = state.fields.find(f => f.kind === 'prompt' && f.enabled && !f.variant);
      const loras = state.fields.filter(f => f.kind === 'lora_list' && f.enabled).flatMap(f => (f.value || [])).filter(l => l.on).map(l => ({ slot: l.slot, on: l.on, strength: l.strength }));
      const seedPinned = state.fields.some(f => f.enabled && f.kind === 'seed' && f._pin && String(f.value).trim() !== '');
      const label = props.name.replace(/^APP /, '').replace(/\.json$/, '');
      startedId.value = launchJob({ workflowFile: props.name, workflowLabel: label, fieldValues: collectFieldValues(), source: props.source, promptText: pf ? pf.value : '', loras: loras.length ? loras : null, preset: selectedPreset.value, seedPinned });
    }
    async function save() { const edits = {}; for (const f of state.fields) edits[f.id] = { enabled: !!f.enabled, label: f.label }; try { const r = await fetch('/api/workflow-field-config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: props.name, edits }) }).then(x => x.json()); msg.value = r.ok ? 'Saved.' : 'Save failed'; } catch (e) { msg.value = 'Save failed'; } setTimeout(() => { if (/Saved|failed/.test(msg.value)) msg.value = ''; }, 2500); }
    const outUrl = f => (isVid(f.name) && f.thumbPath) ? '/file/' + enc(f.thumbPath) : '/file/' + enc(f.path);
    return { state, selectedPreset, msg, job, enabledFields, hiddenFields, isWide, remix, save, load, cancelJob, outUrl };
  },
  template: `
    <div v-if="state.loading" class="muted">Loading fields…</div>
    <div v-else-if="state.error" class="muted">Couldn’t load fields: {{ state.error }}</div>
    <div v-else>
      <div class="fields-grid">
        <div v-for="f in enabledFields" :key="f.id" class="fc-field" :class="{wide: isWide(f)}">
          <label class="fc-lbl"><input type="checkbox" class="fc-hidden-tgl" checked @change="f.enabled = false" title="Hide field"> {{ f.label }} <span v-if="f.unreachable" class="warn" title="not on output path">⚠</span></label>
          <field-control :field="f"></field-control>
        </div>
        <div v-if="!enabledFields.length" class="muted">No fields enabled — open the hidden list below.</div>
      </div>
      <div v-if="state.presets.length" style="margin-top:14px"><label class="fc-lbl" style="margin-bottom:5px">Style preset</label>
        <select class="fc-input" v-model="selectedPreset"><option value="">— none —</option><option v-for="p in state.presets" :key="p.title" :value="p.title">{{ p.title }}</option></select>
      </div>
      <details class="hidden-box" v-if="hiddenFields.length"><summary>{{ hiddenFields.length }} hidden field{{ hiddenFields.length === 1 ? '' : 's' }}</summary>
        <div class="fc-field" v-for="f in hiddenFields" :key="f.id"><label class="fc-lbl"><input type="checkbox" class="fc-hidden-tgl" @change="f.enabled = true" title="Show field"> {{ f.label }} <span class="muted" style="text-transform:none">· {{ f.kind }}</span></label><field-control :field="f"></field-control></div>
      </details>
      <div class="toolbar">
        <button v-if="!job || job.status!=='running'" class="btn go" @click="remix" :disabled="!source">▶ Remix</button>
        <button v-else class="btn cancel" @click="cancelJob(job)">■ Cancel</button>
        <button class="btn primary" @click="save">Save field setup</button>
        <button class="btn" @click="load">↻ Refresh</button>
        <span class="muted" v-if="job">{{ job.status==='running' ? (job._node||'…') : job.status }}</span>
        <span class="muted">{{ msg }}</span>
      </div>
      <div v-if="job && (job.status==='running' || job._pct>0)" class="prog"><div class="prog-fill" :style="{width: job._pct + '%'}"></div></div>
      <div v-if="job && job._log.length" class="log"><div v-for="(l,i) in job._log" :key="i" :class="l.cls">{{ l.m }}</div></div>

    </div>
  `,
};

const InspectModal = {

  components: { FieldsForm },
  emits: ['close'],
  setup(props, { emit }) {
    const workflows = computed(() => store.workflows); const wf = ref('');
    const meta = reactive({ prompt: '', seed: null, loaded: false });
    const isVideo = computed(() => isVid(props.file));
    const source = computed(() => ({ path: props.file, name: (props.file || '').split(/[\\/]/).pop(), type: isVid(props.file) ? 'video' : (isImg(props.file) ? 'image' : 'audio') }));
    async function loadMeta() { meta.loaded = false; meta.prompt = ''; meta.seed = null; let embeddedWf = null; try { const md = await fetch('/api/metadata?path=' + enc(props.file)).then(r => r.json()); meta.prompt = mainPromptOf(md && md.prompt); embeddedWf = md && md.workflow; if (md && md.prompt) for (const n of Object.values(md.prompt)) { if (n && n.inputs) for (const [k, v] of Object.entries(n.inputs)) if (/seed/i.test(k) && typeof v === 'number' && v >= 0) meta.seed = v; } } catch (e) {} meta.loaded = true; return embeddedWf; }
    async function pickWorkflow(embeddedWf) { const wfs = await actions.loadWorkflows(); let pick = wfs[0] && wfs[0].name; if (embeddedWf && embeddedWf.nodes) { try { const m = await fetch('/api/workflow-match', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ workflow: embeddedWf }) }).then(r => r.json()); if (m && m.name) pick = m.name; } catch (e) {} } if (!wf.value) wf.value = pick || ''; }
    async function init() { const embeddedWf = await loadMeta(); await pickWorkflow(embeddedWf); }
    const onKey = e => { if (e.key === 'Escape') emit('close'); };
    onMounted(() => { init(); window.addEventListener('keydown', onKey); });
    onUnmounted(() => window.removeEventListener('keydown', onKey));
    watch(() => props.file, () => { wf.value = ''; init(); });
    return { workflows, wf, meta, source, isVideo, fileUrl: computed(() => '/file/' + enc(props.file)), fileName: computed(() => (props.file || '').split(/[\\/]/).pop()), emit };
  },
  template: `

};

    </div>
    <inspect-modal v-if="inspectFile" :file="inspectFile" @close="closeInspect"></inspect-modal>
  `,
}).use(router).mount('#app');
</script>
